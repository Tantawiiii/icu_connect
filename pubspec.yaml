name: icu_connect
description: "ICU Connect — hospital workflows, admissions, and clinical documentation for care teams."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

#
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  bounce: ^1.0.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  http: ^1.3.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  shimmer: ^3.0.0

  # Preferences
  shared_preferences: ^2.3.5

  image_picker: ^1.1.2
  internet_connection_checker_plus: ^2.9.1+2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


flutter:

  uses-material-design: true


  assets:
     - assets/app_logo_white_back.png
     - assets/app_logo_without_back.png

